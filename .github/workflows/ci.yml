name: CI Check

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "refactor/**"
      - "chore/**"
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: install dependencies
        run: npm ci

      - name: type check
        run: npx tsc --noEmit

      - name: run linter
        run: npm run lint

      - name: run tests
        run: npm run t:run

      - name: build project
        run: npm run b
